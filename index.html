<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Wash Web App</title>
  <meta name="description" content="Entrada principal do app web da Home Wash." />
  <meta http-equiv="refresh" content="0; url=dashboard.html" />
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #061013 0%, #0b181c 100%);
      color: #eff8f8;
      font-family: "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .card {
      width: min(520px, 100%);
      padding: 28px;
      border-radius: 24px;
      background: rgba(13, 31, 36, 0.96);
      border: 1px solid rgba(86, 173, 180, 0.32);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
      text-align: center;
    }
    a {
      color: #87f0b7;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Abrindo o painel da Home Wash...</h1>
    <p>Se o redirecionamento nao acontecer automaticamente, clique em <a href="dashboard.html">ir para o painel</a>.</p>
  </div>
</body>
</html>
